<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1>Employee Management System</h1>
    <div class="container">
        <form id="employeeForm">
            <label for="name">Employee Name:</label>
            <input type="text" id="name" required>

            <label for="id">Employee ID:</label>
            <input type="text" id="id" required>

            <label for="salary">Salary (₹):</label>
            <input type="number" id="salary" required>

            <label for="department">Department:</label>
            <input type="text" id="department" required>

            <button type="submit">Add Employee</button>
        </form>

        <div class="buttons">
            <button id="displayAll">Display All Employees</button>
            <button id="filterSalary">Filter Salary > ₹50,000</button>
            <button id="totalSalary">Total Salary Payout</button>
            <button id="averageSalary">Average Salary</button>
            <button id="countDeptBtn">Count Employees by Department</button>
        </div>

        <div id="results"></div>
    </div>
    <script src="script.js"></script>
</body>

</html>
