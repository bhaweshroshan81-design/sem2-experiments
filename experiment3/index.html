<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Manipulation and Event Handling using JavaScript</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="card">
        <h1 id="pageHeading">Welcome to JavaScript Lab</h1>
        <input id="textInput" type="text" placeholder="Enter new heading text" />

        <div class="btn-row">
            <button id="btnHeading" class="btn">Change Heading</button>
            <button id="btnBg" class="btn">Change Background</button>
            <button id="btnFont" class="btn">Increase Font Size</button>
            <button id="btnToggle" class="btn">Show/Hide Paragraph</button>
            <button id="btnReset" class="btn">Reset</button>
        </div>

        <p id="paragraph">This is a sample paragraph. JavaScript events can dynamically change content.</p>
    </div>

    <script src="script.js"></script>
</body>

</html>
